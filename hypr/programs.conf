###################
### MY PROGRAMS ###
###################

# some variables, please set them accordingly 
#if you use something else
$terminal = kitty
$fileManager = thunar
$menu = rofi -show drun


#############
#AUTOSTART 
#############


exec-once = hyprpaper
exec-once = export $(dbus-launch)
exec-once = pulseaudio
# Update the D-Bus activation environment on startup
exec-once = dbus-update-activation-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
# Force-restart portals to ensure they see the new environment
exec-once = ~/.config/hypr/scripts/portal-fix.sh

